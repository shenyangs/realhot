name: brand-hotspot-studio

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: brand-hotspot-studio:latest
    container_name: brand-hotspot-studio
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env.zspace
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      TZ: ${TZ:-Asia/Shanghai}
      APP_URL: ${APP_URL:-http://127.0.0.1:3000}
    volumes:
      - ./data/runtime:/app/.runtime
